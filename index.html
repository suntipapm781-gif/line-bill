<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill</title>
</head>

<body>

<h2>Order Detail</h2>

<div id="bill"></div>

<script>

const params = new URLSearchParams(window.location.search)

const id = params.get("id")
const name = params.get("name")
const total = params.get("total")

document.getElementById("bill").innerHTML =
`
Order ID : ${id}<br><br>
Customer : ${name}<br><br>
Total : ${total} บาท
`

</script>

</body>
</html>
