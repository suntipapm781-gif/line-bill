<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Payment</title>

<style>

body{
font-family:sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
height:120px;
}

.title{
font-size:22px;
font-weight:600;
margin-bottom:15px;
}

.order-box{
background:#ffffff;
padding:10px 0 20px 0;
}

.order-title{
font-size:24px;
font-weight:700;
margin-bottom:15px;
}

.order-text{
font-size:18px;
margin-bottom:10px;
}

.total{
font-size:22px;
font-weight:700;
margin-top:20px;
}

.qr{
text-align:center;
margin:20px 0;
}

.qr img{
width:230px;
}

.info{
background:#f1f3f6;
padding:20px;
border-radius:12px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.label{
color:#666;
}

.value{
font-weight:600;
}

.amount{
color:#1677ff;
font-weight:700;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo png.png">
</div>

<div class="title">การชำระเงิน</div>

<div class="order-box">

<div class="order-title">Order Detail</div>

<div class="order-text">Order ID : 20586</div>

<div class="order-text">Customer : kkk</div>

<br>

<div class="order-text">รายการ</div>
<div class="order-text">k1 = 200 บาท</div>
<div class="order-text">k2 = 200 บาท</div>
<div class="order-text">k23 = 2002 บาท</div>

<div class="total">Total : 2402 บาท</div>

</div>

<div class="qr">
<p>สแกนเพื่อชำระเงิน</p>
<img src="https://promptpay.io/0508347642/210.png">
</div>

<div class="info">

<div class="row">
<div class="label">เลขออเดอร์</div>
<div class="value">DNB0636</div>
</div>

<div class="row">
<div class="label">เลขที่บัญชี</div>
<div class="value">0508347642</div>
</div>

<div class="row">
<div class="label">ชื่อบัญชี</div>
<div class="value">สันติภาพ มีมั่งคั่ง</div>
</div>

<div class="row">
<div class="label">ธนาคาร</div>
<div class="value">กสิกร (KPLUS)</div>
</div>

<div class="row">
<div class="label">ยอดเงิน</div>
<div class="amount">฿ 210.00</div>
</div>

</div>

</div>

</body>
</html>
