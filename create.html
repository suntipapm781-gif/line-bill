<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สร้างออเดอร์</title>

<style>

body{
font-family:sans-serif;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#1677ff;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
word-break:break-all;
}

</style>
</head>

<body>

<div class="container">

<h2>สร้างออเดอร์</h2>

<input id="orderId" placeholder="Order ID">

<input id="customer" placeholder="Customer">

<input id="item1" placeholder="สินค้า 1">

<input id="price1" placeholder="ราคา 1">

<input id="item2" placeholder="สินค้า 2">

<input id="price2" placeholder="ราคา 2">

<input id="item3" placeholder="สินค้า 3">

<input id="price3" placeholder="ราคา 3">

<button onclick="createBill()">สร้างบิล</button>

<div class="result" id="result"></div>

</div>

<script>

function createBill(){

let orderId=document.getElementById("orderId").value
let customer=document.getElementById("customer").value

let item1=document.getElementById("item1").value
let price1=document.getElementById("price1").value

let item2=document.getElementById("item2").value
let price2=document.getElementById("price2").value

let item3=document.getElementById("item3").value
let price3=document.getElementById("price3").value

let total=Number(price1)+Number(price2)+Number(price3)

let url=location.origin+
"/?order="+orderId+
"&customer="+customer+
"&i1="+item1+
"&p1="+price1+
"&i2="+item2+
"&p2="+price2+
"&i3="+item3+
"&p3="+price3+
"&total="+total

document.getElementById("result").innerHTML=

"ลิงก์บิล:<br><br>"+url

}

</script>

</body>
</html>
