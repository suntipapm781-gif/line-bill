<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>การชำระเงิน</title>

<style>

body{
font-family:sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
height:120px;
}

.title{
font-size:22px;
font-weight:600;
margin-bottom:20px;
}

.qr{
text-align:center;
margin-bottom:20px;
}

.qr img{
width:220px;
border-radius:12px;
}

.info{
background:#f7f9fc;
padding:20px;
border-radius:12px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:14px;
font-size:15px;
}

.label{
color:#666;
}

.value{
font-weight:600;
}

.amount{
color:#0066ff;
font-weight:700;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo png.png">
</div>

<div class="title">การชำระเงิน</div>

<div class="qr">
<p>สแกนเพื่อชำระเงิน</p>
<img src="qr.png">
</div>

<div class="info">

<div class="row">
<div class="label">เลขออเดอร์</div>
<div class="value">DNB0636</div>
</div>

<div class="row">
<div class="label">เลขที่บัญชี</div>
<div class="value">0508347642</div>
</div>

<div class="row">
<div class="label">ชื่อบัญชี</div>
<div class="value">สันติภาพ มีมั่งคั่ง</div>
</div>

<div class="row">
<div class="label">ธนาคาร</div>
<div class="value">กสิกร (KPLUS)</div>
</div>

<div class="row">
<div class="label">ยอดเงิน</div>
<div class="amount">฿ 210.00</div>
</div>

</div>

</div>

</body>
</html>
