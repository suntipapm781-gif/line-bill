<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สร้างบิล</title>

<style>
body{
font-family:sans-serif;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
margin-bottom:10px;
}
.logo img{
height:120px;
}

h2{margin-bottom:10px;}

.label{
font-weight:600;
margin:10px 0 5px;
display:block;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.table{
margin-top:10px;
}

.row{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:8px;
margin-bottom:8px;
}

.header{
font-weight:600;
background:#f1f3f6;
padding:8px;
border-radius:6px;
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:8px;
text-align:center;
}

button{
width:100%;
padding:12px;
background:#1677ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.add-btn{
background:#00b894;
margin-top:5px;
}

.result{
margin-top:15px;
word-break:break-all;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo png.png">
</div>

<h2>สร้างบิล</h2>

<label class="label">Order ID</label>
<input id="order">

<label class="label">ชื่อลูกค้า</label>
<input id="customer">

<div class="table">

<div class="header">
<div>ชื่อสินค้า</div>
<div>ราคา</div>
<div>จำนวน</div>
<div>รวม</div>
</div>

<div id="items"></div>

<button class="add-btn" onclick="addRow()">+ เพิ่มสินค้า</button>

</div>

<label class="label">ค่าส่ง</label>
<input id="shipping" placeholder="ใส่ตัวเลข หรือ พิมพ์ว่า ฟรี">

<button onclick="createBill()">สร้างลิงก์บิล</button>

<div class="result" id="result"></div>

</div>

<script>

function generateOrderID(){
return "ORD"+Math.floor(100000+Math.random()*900000);
}
document.getElementById("order").value = generateOrderID();

// เพิ่มสินค้า
function addRow(){
let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<input class="item" placeholder="ชื่อสินค้า">
<input class="price" placeholder="ราคา" oninput="calc(this)">
<input class="qty" placeholder="จำนวน" oninput="calc(this)">
<input class="sum" placeholder="รวม" disabled>
`;

document.getElementById("items").appendChild(div);
}

// คำนวณรวม
function calc(el){
let row=el.parentElement;
let price=row.querySelector(".price").value;
let qty=row.querySelector(".qty").value;

let sum = (Number(price)||0) * (Number(qty)||0);
row.querySelector(".sum").value = sum;
}

// เริ่มต้น 1 แถว
addRow();

function createBill(){

let order=document.getElementById("order").value;
let customer=document.getElementById("customer").value;
let shipping=document.getElementById("shipping").value;

let items=document.querySelectorAll(".row");

let url="index.html?order="+order+"&customer="+customer;

let total=0;

items.forEach((row,i)=>{
let item=row.querySelector(".item").value;
let price=row.querySelector(".price").value;
let qty=row.querySelector(".qty").value;
let sum=row.querySelector(".sum").value;

if(item){
url+=`&i${i+1}=${item}&p${i+1}=${price}&q${i+1}=${qty}&s${i+1}=${sum}`;
total+=Number(sum||0);
}
});

// ✅ รองรับ "ฟรี"
let shippingValue = Number(shipping);
if(isNaN(shippingValue)){
shippingValue = 0;
}

let final = total + shippingValue;

// ส่งทั้งค่า text + ค่าเลข
url+=`&total=${total}&shipping=${shipping}&shippingValue=${shippingValue}&final=${final}`;

document.getElementById("result").innerHTML =
"<a href='"+url+"' target='_blank'>"+url+"</a>";

}

</script>

</body>
</html>
