<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Create Bill</title>
</head>

<body>

<h2>สร้างบิล</h2>

<label>ชื่อลูกค้า</label><br> <input id="name"><br><br>

<h3>เพิ่มสินค้า</h3>

<input id="item" placeholder="ชื่อสินค้า">
<input id="price" placeholder="ราคา">
<button onclick="addItem()">เพิ่มรายการ</button>

<ul id="list"></ul>

<h3 id="total">Total : 0 บาท</h3>

<button onclick="createBill()">สร้างบิล</button>

<p id="link"></p>

<script>

let items = []
let sum = 0

function addItem(){

let item = document.getElementById("item").value
let price = Number(document.getElementById("price").value)

items.push(item + ":" + price)

sum += price

document.getElementById("list").innerHTML += "<li>"+item+" = "+price+" บาท</li>"

document.getElementById("total").innerText = "Total : "+sum+" บาท"

}

function createBill(){

let id = Math.floor(Math.random()*100000)
let name = document.getElementById("name").value

let itemString = items.join(",")

let url = "https://line-bill.vercel.app/?id="+id+"&name="+name+"&items="+itemString+"&total="+sum

document.getElementById("link").innerHTML =
'<a href="'+url+'" target="_blank">'+url+'</a>'

}

</script>

</body>
</html>
