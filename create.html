<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สร้างบิล</title>

<style>
body{
font-family:sans-serif;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#1677ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
word-break:break-all;
}
</style>

</head>

<body>

<div class="container">

<h2>สร้างบิล</h2>

<input id="order" placeholder="Order ID">

<input id="customer" placeholder="ชื่อลูกค้า">

<input id="item1" placeholder="สินค้า 1">
<input id="price1" placeholder="ราคา 1">
<input id="qty1" placeholder="จำนวน 1">

<input id="item2" placeholder="สินค้า 2">
<input id="price2" placeholder="ราคา 2">
<input id="qty2" placeholder="จำนวน 2">

<input id="item3" placeholder="สินค้า 3">
<input id="price3" placeholder="ราคา 3">
<input id="qty3" placeholder="จำนวน 3">

<button onclick="createBill()">สร้างลิงก์บิล</button>

<div class="result" id="result"></div>

</div>

<script>

// สุ่ม Order ID
function generateOrderID(){
return "ORD"+Math.floor(100000+Math.random()*900000);
}

document.getElementById("order").value = generateOrderID();

function createBill(){

let order=document.getElementById("order").value
let customer=document.getElementById("customer").value

let item1=document.getElementById("item1").value
let price1=document.getElementById("price1").value
let qty1=document.getElementById("qty1").value

let item2=document.getElementById("item2").value
let price2=document.getElementById("price2").value
let qty2=document.getElementById("qty2").value

let item3=document.getElementById("item3").value
let price3=document.getElementById("price3").value
let qty3=document.getElementById("qty3").value

// คำนวณ
let sum1 = Number(price1||0) * Number(qty1||0)
let sum2 = Number(price2||0) * Number(qty2||0)
let sum3 = Number(price3||0) * Number(qty3||0)

let total = sum1 + sum2 + sum3

// สร้าง URL
let url =
"index.html"+
"?order="+order+
"&customer="+customer+

"&i1="+item1+
"&p1="+price1+
"&q1="+qty1+
"&s1="+sum1+

"&i2="+item2+
"&p2="+price2+
"&q2="+qty2+
"&s2="+sum2+

"&i3="+item3+
"&p3="+price3+
"&q3="+qty3+
"&s3="+sum3+

"&total="+total

document.getElementById("result").innerHTML =
"ลิงก์บิล:<br><br><a href='"+url+"' target='_blank'>"+url+"</a>"

}

</script>

</body>
</html>
