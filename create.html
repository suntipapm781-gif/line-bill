<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สร้างบิล</title>

<style>
body{
font-family:sans-serif;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h2{margin-bottom:15px;}

.section{
margin-bottom:15px;
}

.label{
font-weight:600;
margin-bottom:5px;
display:block;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.row{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:5px;
margin-bottom:8px;
}

.row input{
margin:0;
}

.header{
font-weight:600;
background:#f1f3f6;
padding:8px;
border-radius:6px;
text-align:center;
}

button{
width:100%;
padding:12px;
background:#1677ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:15px;
word-break:break-all;
}
</style>

</head>

<body>

<div class="container">

<h2>สร้างบิล</h2>

<div class="section">
<label class="label">Order ID</label>
<input id="order">
</div>

<div class="section">
<label class="label">Customer</label>
<input id="customer">
</div>

<div class="section">
<div class="header">ชื่อสินค้า | ราคา | จำนวน | รวม</div>

<!-- แถว 1 -->
<div class="row">
<input id="item1" placeholder="1. ชื่อสินค้า">
<input id="price1" placeholder="ราคา">
<input id="qty1" placeholder="จำนวน">
<input placeholder="รวม" disabled>
</div>

<!-- แถว 2 -->
<div class="row">
<input id="item2" placeholder="2. ชื่อสินค้า">
<input id="price2" placeholder="ราคา">
<input id="qty2" placeholder="จำนวน">
<input placeholder="รวม" disabled>
</div>

<!-- แถว 3 -->
<div class="row">
<input id="item3" placeholder="3. ชื่อสินค้า">
<input id="price3" placeholder="ราคา">
<input id="qty3" placeholder="จำนวน">
<input placeholder="รวม" disabled>
</div>

</div>

<div class="section">
<label class="label">ค่าส่ง</label>
<input id="shipping">
</div>

<button onclick="createBill()">สร้างลิงก์บิล</button>

<div class="result" id="result"></div>

</div>

<script>

function generateOrderID(){
return "ORD"+Math.floor(100000+Math.random()*900000);
}
document.getElementById("order").value = generateOrderID();

function createBill(){

let order = document.getElementById("order").value
let customer = document.getElementById("customer").value

let item1 = document.getElementById("item1").value
let price1 = document.getElementById("price1").value
let qty1 = document.getElementById("qty1").value

let item2 = document.getElementById("item2").value
let price2 = document.getElementById("price2").value
let qty2 = document.getElementById("qty2").value

let item3 = document.getElementById("item3").value
let price3 = document.getElementById("price3").value
let qty3 = document.getElementById("qty3").value

let shipping = document.getElementById("shipping").value

let s1 = (price1||0)*(qty1||0)
let s2 = (price2||0)*(qty2||0)
let s3 = (price3||0)*(qty3||0)

let total = Number(s1)+Number(s2)+Number(s3)
let final = total + Number(shipping||0)

let url = "index.html"+
"?order="+order+
"&customer="+customer+

"&i1="+item1+"&p1="+price1+"&q1="+qty1+"&s1="+s1+
"&i2="+item2+"&p2="+price2+"&q2="+qty2+"&s2="+s2+
"&i3="+item3+"&p3="+price3+"&q3="+qty3+"&s3="+s3+

"&total="+total+
"&shipping="+shipping+
"&final="+final

document.getElementById("result").innerHTML =
"<a href='"+url+"' target='_blank'>"+url+"</a>"

}

</script>

</body>
</html>
