<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<style>

body{
font-family:sans-serif;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.logo{text-align:center;margin-bottom:10px;}
.logo img{height:120px;}

.header-payment{
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:22px;
font-weight:600;
}

.status{
padding:6px 12px;
border-radius:8px;
font-weight:600;
}

.status-red{
border:2px solid red;
color:red;
}

.status-green{
border:2px solid green;
color:green;
}

.order-title{
font-size:24px;
font-weight:700;
margin:15px 0 10px;
}

.order-text{
font-size:18px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:15px;
}

th{
background:#f1f3f6;
}

th,td{
padding:8px;
}

td:nth-child(1){text-align:left;}
td:nth-child(2){text-align:center;}
td:nth-child(3){text-align:center;}
td:nth-child(4){text-align:right;}

.summary{
background:#f1f3f6;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.qr{text-align:center;margin:20px 0;}
.qr img{width:220px;}

.info{
background:#f1f3f6;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.info-row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.btn{
background:#1677ff;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
margin-left:8px;
}

.address{
margin-top:15px;
white-space:pre-line;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo png.png">
</div>

<div class="header-payment">
<div class="title">การชำระเงิน</div>
<div id="statusBox" class="status"></div>
</div>

<div class="order-title">Order Detail</div>

<div class="order-text">
Order ID : <span id="order"></span>
</div>

<div class="order-text">
Customer : <span id="customer"></span>
</div>

<div style="font-weight:600;margin:10px 0;">ข้อมูลสินค้า</div>

<table>
<thead>
<tr>
<th>ชื่อสินค้า</th>
<th>ราคา</th>
<th>จำนวน</th>
<th>รวม</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<div class="summary">

<div class="row"><span>ยอดรวมสินค้า</span><span id="sub"></span></div>
<div class="row"><span>ค่าส่ง</span><span id="ship"></span></div>
<div class="row" style="font-weight:700;"><span>ยอดรวม</span><span id="final"></span></div>

<div id="depositRow" style="display:none;">
<div class="row"><span>มัดจำ</span><span id="deposit"></span></div>
<div class="row"><span>ยอดค้างจ่าย</span><span id="balance"></span></div>
</div>

</div>

<div class="qr">
<p>สแกนเพื่อชำระเงิน</p>
<img id="qr">
<br><br>
<button class="btn" onclick="saveQR()">บันทึก QR</button>
</div>

<div class="info">

<div class="info-row">
<span>เลขออเดอร์</span>
<span id="order2"></span>
</div>

<div class="info-row">
<span>เลขที่บัญชี</span>
<span>
<span id="accountNumber">0508347642</span>
<button class="btn" onclick="copyAccount()">คัดลอก</button>
</span>
</div>

<div class="info-row">
<span>ชื่อบัญชี</span>
<span>สันติภาพ มีมั่งคั่ง</span>
</div>

<div class="info-row">
<span>ธนาคาร</span>
<span>กสิกร (KPLUS)</span>
</div>

<div class="info-row">
<span>ยอดเงิน</span>
<span id="amount"></span>
</div>

<div class="info-row">
<span>วันที่</span>
<span id="date"></span>
</div>

<div class="address">
<b>ที่อยู่จัดส่ง</b>
<div id="address"></div>
</div>

</div>

</div>

<script>

function format(n){
return Number(n||0).toLocaleString();
}

const p=new URLSearchParams(location.search);

let order=p.get("order");
let customer=p.get("customer");
let status=p.get("status");
let deposit=p.get("deposit");
let address=p.get("address");

document.getElementById("order").innerText=order;
document.getElementById("order2").innerText=order;
document.getElementById("customer").innerText=customer;

let statusBox=document.getElementById("statusBox");
statusBox.innerText=status;

if(status==="มัดจำ"){
statusBox.classList.add("status-red");
}else{
statusBox.classList.add("status-green");
}

let tbody=document.getElementById("tbody");

let i=1;
let total=0;

while(p.get("i"+i)){

let name=p.get("i"+i);
let price=p.get("p"+i);
let qty=p.get("q"+i);
let sum=p.get("s"+i);

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${name}</td>
<td>${format(price)}</td>
<td>${qty}</td>
<td>${format(sum)}</td>
`;

tbody.appendChild(tr);

total+=Number(sum||0);
i++;

}

let shipping=p.get("shipping");
let shippingValue=p.get("shippingValue");

if(!shippingValue || isNaN(shippingValue)){
shippingValue=0;
}

let final=total+Number(shippingValue||0);

document.getElementById("sub").innerText=format(total);
document.getElementById("ship").innerText=shipping||0;
document.getElementById("final").innerText=format(final);
document.getElementById("amount").innerText="฿ "+format(final);

document.getElementById("qr").src=
"https://promptpay.io/0508347642/"+final+".png";

if(status==="มัดจำ" && deposit){

let dep=Number(deposit);
let balance=final-dep;

document.getElementById("depositRow").style.display="block";

document.getElementById("deposit").innerText=format(dep);
document.getElementById("balance").innerText=format(balance);

}

if(address){
document.getElementById("address").innerText=decodeURIComponent(address);
}

function copyAccount(){
let text=document.getElementById("accountNumber").innerText;
navigator.clipboard.writeText(text);
alert("คัดลอกเลขบัญชีแล้ว");
}

function saveQR(){
let img=document.getElementById("qr").src;
let a=document.createElement("a");
a.href=img;
a.download="promptpay-qr.png";
a.click();
}

let d=new Date();
document.getElementById("date").innerText=d.toLocaleDateString("th-TH");

</script>

</body>
</html>
