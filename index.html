<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Bill</title>
</head>

<body>

<h2>Order Detail</h2>

<div id="bill"></div>

<script>

const params = new URLSearchParams(window.location.search)

const id = params.get("id")
const name = params.get("name")
const total = params.get("total")
const items = params.get("items")

let itemList = ""

if(items){

let arr = items.split(",")

arr.forEach(i=>{

let p = i.split(":")

itemList += p[0]+" = "+p[1]+" บาท<br>"

})

}

document.getElementById("bill").innerHTML = `
Order ID : ${id}<br><br>
Customer : ${name}<br><br>

รายการ<br>
${itemList}<br>

Total : ${total} บาท
`

</script>

</body>
</html>
