<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<style>

body{
font-family:sans-serif;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
height:120px;
}

.title{
font-size:22px;
font-weight:600;
margin-bottom:15px;
}

.order-box{
margin-bottom:20px;
}

.order-title{
font-size:24px;
font-weight:700;
margin-bottom:10px;
}

.order-text{
font-size:18px;
margin-bottom:10px;
}

.total{
font-size:22px;
font-weight:700;
margin-top:10px;
}

.qr{
text-align:center;
margin:20px 0;
}

.qr img{
width:220px;
}

.info{
background:#f1f3f6;
padding:20px;
border-radius:12px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.label{
color:#666;
}

.value{
font-weight:600;
}

.amount{
color:#1677ff;
font-weight:700;
}

.copy-btn{
margin-left:8px;
padding:4px 10px;
border:none;
background:#1677ff;
color:white;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo png.png">
</div>

<div class="title">การชำระเงิน</div>

<div class="order-box">

<div class="order-title">Order Detail</div>

<div class="order-text">
Order ID : <span class="order-id">-</span>
</div>

<div class="order-text">
Customer : <span class="customer">-</span>
</div>

<br>

<div>รายการ</div>

<div class="item1">-</div>
<div class="item2">-</div>
<div class="item3">-</div>

<div class="total">Total : 0 บาท</div>

</div>

<div class="qr">

<p>สแกนเพื่อชำระเงิน</p>

<img src="https://promptpay.io/0508347642/0.png">

</div>

<div class="info">

<div class="row">
<div class="label">เลขออเดอร์</div>
<div class="value order-number">-</div>
</div>

<div class="row">
<div class="label">เลขที่บัญชี</div>
<div class="value">
<span id="accountNumber">0508347642</span>
<button class="copy-btn" onclick="copyAccount()">คัดลอก</button>
</div>
</div>

<div class="row">
<div class="label">ชื่อบัญชี</div>
<div class="value">สันติภาพ มีมั่งคั่ง</div>
</div>

<div class="row">
<div class="label">ธนาคาร</div>
<div class="value">กสิกร (KPLUS)</div>
</div>

<div class="row">
<div class="label">ยอดเงิน</div>
<div class="amount">฿ 0.00</div>
</div>

<div class="row">
<div class="label">วันที่</div>
<div class="value date"></div>
</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const order = params.get("order");
const customer = params.get("customer");
const i1 = params.get("i1");
const p1 = params.get("p1");
const i2 = params.get("i2");
const p2 = params.get("p2");
const i3 = params.get("i3");
const p3 = params.get("p3");
const total = params.get("total");

if(order){

document.querySelector(".order-id").innerText = order;
document.querySelector(".order-number").innerText = order;

document.querySelector(".customer").innerText = customer;

document.querySelector(".item1").innerText = i1 + " = " + p1 + " บาท";
document.querySelector(".item2").innerText = i2 + " = " + p2 + " บาท";
document.querySelector(".item3").innerText = i3 + " = " + p3 + " บาท";

document.querySelector(".total").innerText = "Total : " + total + " บาท";

document.querySelector(".amount").innerText = "฿ " + total + ".00";

document.querySelector(".qr img").src =
"https://promptpay.io/0508347642/"+total+".png";

}

// วันที่ปัจจุบัน

const today = new Date();

const options = {
year: "numeric",
month: "short",
day: "numeric"
};

let fullDate = today.toLocaleDateString("th-TH", options);

let d = String(today.getDate()).padStart(2,"0");
let m = String(today.getMonth()+1).padStart(2,"0");
let y = String(today.getFullYear()).slice(-2);

let shortDate = d + m + y;

document.querySelector(".date").innerText =
fullDate + " (" + shortDate + ")";

function copyAccount(){

const text =
document.getElementById("accountNumber").innerText;

navigator.clipboard.writeText(text);

alert("คัดลอกเลขบัญชีแล้ว");

}

</script>

</body>
</html>
