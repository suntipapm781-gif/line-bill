<!DOCTYPE html> 
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สร้างบิล</title>

<style>
body{
    font-family:sans-serif;
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:520px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.logo{text-align:center;margin-bottom:10px;}
.logo img{height:120px;}

.label{
    font-weight:600;
    margin:10px 0 5px;
    display:block;
}

input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.row{
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1.2fr 45px;
    gap:10px;
    margin-bottom:10px;
    align-items:center;
}

.header{
    font-weight:600;
    background:#f1f3f6;
    padding:10px;
    border-radius:8px;
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1.2fr 45px;
    text-align:center;
}

.sum{
    background:#f8f8f8;
    text-align:center;
    font-weight:700;
}

.delete-btn{
    background:#ff4d4f;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    height:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#1677ff;
    color:white;
    border:none;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
}

.add-btn{background:#00b894;}

.result{
    margin-top:15px;
    word-break:break-all;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo png.png">
</div>

<h2>สร้างบิล</h2>

<label class="label">Order ID</label>
<input id="order">

<label class="label">ชื่อลูกค้า</label>
<input id="customer">

<div class="header">
<div>ชื่อสินค้า</div>
<div>ราคา</div>
<div>จำนวน</div>
<div>รวม</div>
<div></div>
</div>

<div id="items"></div>

<button class="add-btn" onclick="addRow()">+ เพิ่มสินค้า</button>

<label class="label">ค่าส่ง</label>
<input id="shipping" placeholder="เช่น 50 หรือ ฟรี">

<button onclick="createBill()">สร้างลิงก์บิล</button>

<div id="result" class="result"></div>

</div>

<script>

// สุ่ม Order ID
document.getElementById("order").value =
"ORD"+Math.floor(100000+Math.random()*900000);

// เพิ่มแถว
function addRow(){

    let row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
    <input class="item" placeholder="ชื่อสินค้า">
    <input class="price" placeholder="ราคา" oninput="calc(this)">
    <input class="qty" value="1" oninput="calc(this)">
    <input class="sum" disabled>

    <button class="delete-btn" onclick="deleteRow(this)">✕</button>
    `;

    document.getElementById("items").appendChild(row);
}

// ลบสินค้า
function deleteRow(btn){
    btn.closest(".row").remove();
}

// คำนวณ
function calc(el){

    let row = el.closest(".row");

    let price = row.querySelector(".price").value;
    let qty = row.querySelector(".qty").value;

    let sum = (Number(price)||0) * (Number(qty)||0);

    row.querySelector(".sum").value = sum;
}

// เริ่มต้น
addRow();

// สร้างลิงก์
function createBill(){

    let order = document.getElementById("order").value;
    let customer = document.getElementById("customer").value;
    let shipping = document.getElementById("shipping").value;

    let rows = document.querySelectorAll(".row");

    let url = "index.html?order=" + encodeURIComponent(order)
            + "&customer=" + encodeURIComponent(customer);

    let total = 0;

    rows.forEach((row,i)=>{

        let item = row.querySelector(".item").value;
        let price = row.querySelector(".price").value;
        let qty = row.querySelector(".qty").value;
        let sum = row.querySelector(".sum").value;

        if(item){
            url += `&i${i+1}=${encodeURIComponent(item)}`
                 + `&p${i+1}=${price}`
                 + `&q${i+1}=${qty}`
                 + `&s${i+1}=${sum}`;

            total += Number(sum||0);
        }

    });

    let shippingValue = Number(shipping);
    if(isNaN(shippingValue)) shippingValue = 0;

    let final = total + shippingValue;

    url += `&total=${total}`
         + `&shipping=${encodeURIComponent(shipping)}`
         + `&shippingValue=${shippingValue}`
         + `&final=${final}`;

    document.getElementById("result").innerHTML =
    `<a href="${url}" target="_blank">${url}</a>`;
}

</script>

</body>
</html>
