<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Bill</title>

<style>

body{
font-family: Arial;
text-align:center;
}

.bill-box{
max-width:400px;
margin:auto;
text-align:left;
}

</style>

</head>

<body>

<img src="logo.png" width="120"><br><br>

<h2>Order Detail</h2>

<div class="bill-box">

<div id="bill"></div>

</div>

<br>

<h3>สแกนจ่ายเงิน</h3>

<img id="qr" width="250">

<script>

const params = new URLSearchParams(window.location.search)

const id = params.get("id")
const name = params.get("name")
const total = params.get("total")
const items = params.get("items")

let itemList = ""

if(items){

let arr = items.split(",")

arr.forEach(i=>{

let p = i.split(":")

itemList += p[0]+" = "+p[1]+" บาท<br>"

})

}

document.getElementById("bill").innerHTML = `
Order ID : ${id}<br><br>
Customer : ${name}<br><br>

รายการ<br>
${itemList}<br>

Total : ${total} บาท
`

let phone = "0954693100"

let qrURL = "https://promptpay.io/"+phone+"/"+total+".png"

document.getElementById("qr").src = qrURL

</script>

</body>
</html>
