<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Order</title>
</head>

<body>

<h1>Order Detail</h1>

<p id="order">Order ID :</p>
<p id="customer">Customer :</p>
<p id="total">Total :</p>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id") || "0000";
const customer = params.get("name") || "Unknown";
const total = params.get("total") || "0";

document.getElementById("order").innerText = "Order ID : " + id;
document.getElementById("customer").innerText = "Customer : " + customer;
document.getElementById("total").innerText = "Total : " + total + " บาท";

</script>

</body>
</html>
