<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สร้างบิล</title>

<style>
body{font-family:sans-serif;background:#f4f6f9;padding:20px;}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.logo{text-align:center;margin-bottom:10px;}
.logo img{height:120px;}

.label{font-weight:600;margin:10px 0 5px;display:block;}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.row{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:8px;
margin-bottom:8px;
}

.header{
font-weight:600;
background:#f1f3f6;
padding:8px;
border-radius:6px;
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
text-align:center;
}

button{
width:100%;
padding:12px;
background:#1677ff;
color:white;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.add-btn{background:#00b894;}

.result{margin-top:15px;word-break:break-all;}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo png.png">
</div>

<h2>สร้างบิล</h2>

<label class="label">Order ID</label>
<input id="order">

<label class="label">ชื่อลูกค้า</label>
<input id="customer">

<div class="header">
<div>ชื่อสินค้า</div>
<div>ราคา</div>
<div>จำนวน</div>
<div>รวม</div>
</div>

<div id="items"></div>

<button class="add-btn" onclick="addRow()">+ เพิ่มสินค้า</button>

<label class="label">ค่าส่ง</label>
<input id="shipping" placeholder="เช่น 50 หรือ ฟรี">

<button onclick="createBill()">สร้างลิงก์บิล</button>

<div id="result" class="result"></div>

</div>

<script>

// 🔥 รายการสินค้า (อ่านง่าย + เว้นวรรค)
const productList = {
"สติกเกอร์ 12 ชิ้น": 299,
"สติกเกอร์ 28 ชิ้น": 399,
"สติกเกอร์ 36 ชิ้น": 499,
"สติกเกอร์ 54 ชิ้น": 699,
"สติกเกอร์ 108 ชิ้น": 999
};

// สร้าง Order ID
document.getElementById("order").value =
"ORD"+Math.floor(100000+Math.random()*900000);

// เพิ่มแถวสินค้า
function addRow(){

let row=document.createElement("div");
row.className="row";

let options = `<option value="">เลือกสินค้า</option>`;
for(let name in productList){
options += `<option value="${name}">${name}</option>`;
}

row.innerHTML=`
<select class="item" onchange="setPrice(this)">
${options}
</select>

<input class="price" placeholder="ราคา">
<input class="qty" placeholder="จำนวน" value="1" oninput="calc(this)">
<input class="sum" placeholder="รวม" disabled>
`;

document.getElementById("items").appendChild(row);
}

// ตั้งราคาอัตโนมัติ
function setPrice(el){
let row = el.parentElement;
let priceInput = row.querySelector(".price");

let value = el.value;
if(productList[value]){
priceInput.value = productList[value];
}

calc(el);
}

// คำนวณ
function calc(el){
let row = el.parentElement;

let price = row.querySelector(".price").value;
let qty = row.querySelector(".qty").value;

let sum = (Number(price)||0)*(Number(qty)||0);

row.querySelector(".sum").value = sum;
}

// เริ่มต้น 1 แถว
addRow();

// สร้างลิงก์
function createBill(){

let order=document.getElementById("order").value;
let customer=document.getElementById("customer").value;
let shipping=document.getElementById("shipping").value;

let rows=document.querySelectorAll(".row");

let url="index.html?order="+order+"&customer="+customer;

let total=0;

rows.forEach((row,i)=>{

let item=row.querySelector(".item").value;
let price=row.querySelector(".price").value;
let qty=row.querySelector(".qty").value;
let sum=row.querySelector(".sum").value;

if(item){
url+=`&i${i+1}=${item}&p${i+1}=${price}&q${i+1}=${qty}&s${i+1}=${sum}`;
total+=Number(sum||0);
}

});

// รองรับ "ฟรี"
let shippingValue = Number(shipping);
if(isNaN(shippingValue)){
shippingValue = 0;
}

let final = total + shippingValue;

url+=`&total=${total}&shipping=${shipping}&shippingValue=${shippingValue}&final=${final}`;

document.getElementById("result").innerHTML =
`<a href="${url}" target="_blank">${url}</a>`;

}

</script>

</body>
</html>
