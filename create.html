<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สร้างบิล</title>

<style>
body{font-family:sans-serif;background:#f4f6f9;padding:20px;}
.container{max-width:500px;margin:auto;background:white;padding:20px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:12px;background:#1677ff;color:white;border:none;border-radius:8px;}
.result{margin-top:20px;word-break:break-all;}
</style>
</head>

<body>
<div class="container">

<h2>สร้างบิล</h2>

<input id="order">
<input id="customer" placeholder="ชื่อลูกค้า">

<input id="item1" placeholder="สินค้า 1">
<input id="price1" placeholder="ราคา 1">
<input id="qty1" placeholder="จำนวน 1">

<input id="item2" placeholder="สินค้า 2">
<input id="price2" placeholder="ราคา 2">
<input id="qty2" placeholder="จำนวน 2">

<input id="item3" placeholder="สินค้า 3">
<input id="price3" placeholder="ราคา 3">
<input id="qty3" placeholder="จำนวน 3">

<input id="shipping" placeholder="ค่าส่ง">

<button onclick="createBill()">สร้างลิงก์บิล</button>

<div class="result" id="result"></div>

</div>

<script>

function generateOrderID(){
return "ORD"+Math.floor(100000+Math.random()*900000);
}
document.getElementById("order").value = generateOrderID();

function createBill(){

let order = order = document.getElementById("order").value
let customer = document.getElementById("customer").value

let item1 = document.getElementById("item1").value
let price1 = document.getElementById("price1").value
let qty1 = document.getElementById("qty1").value

let item2 = document.getElementById("item2").value
let price2 = document.getElementById("price2").value
let qty2 = document.getElementById("qty2").value

let item3 = document.getElementById("item3").value
let price3 = document.getElementById("price3").value
let qty3 = document.getElementById("qty3").value

let shipping = document.getElementById("shipping").value

let s1 = (price1||0)*(qty1||0)
let s2 = (price2||0)*(qty2||0)
let s3 = (price3||0)*(qty3||0)

let total = Number(s1)+Number(s2)+Number(s3)
let final = total + Number(shipping||0)

let url = "index.html"+
"?order="+order+
"&customer="+customer+

"&i1="+item1+"&p1="+price1+"&q1="+qty1+"&s1="+s1+
"&i2="+item2+"&p2="+price2+"&q2="+qty2+"&s2="+s2+
"&i3="+item3+"&p3="+price3+"&q3="+qty3+"&s3="+s3+

"&total="+total+
"&shipping="+shipping+
"&final="+final

document.getElementById("result").innerHTML =
"<a href='"+url+"' target='_blank'>"+url+"</a>"

}
</script>
</body>
</html>
