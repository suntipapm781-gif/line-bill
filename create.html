<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สร้างบิล</title>

<style>
body{
font-family:sans-serif;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1677ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

.result{
margin-top:20px;
word-break:break-all;
}
</style>

</head>

<body>

<div class="container">

<h2>สร้างบิล</h2>

<input id="order" placeholder="Order ID">

<input id="customer" placeholder="ชื่อลูกค้า">

<input id="item1" placeholder="สินค้า 1">
<input id="price1" placeholder="ราคา 1">

<input id="item2" placeholder="สินค้า 2">
<input id="price2" placeholder="ราคา 2">

<input id="item3" placeholder="สินค้า 3">
<input id="price3" placeholder="ราคา 3">

<button onclick="createBill()">สร้างบิล</button>

<div class="result" id="result"></div>

</div>

<script>

function createBill(){

let order=document.getElementById("order").value
let customer=document.getElementById("customer").value

let item1=document.getElementById("item1").value
let price1=document.getElementById("price1").value

let item2=document.getElementById("item2").value
let price2=document.getElementById("price2").value

let item3=document.getElementById("item3").value
let price3=document.getElementById("price3").value

let total=
Number(price1)+
Number(price2)+
Number(price3)

let url=
location.origin+
"/?order="+order+
"&customer="+customer+
"&i1="+item1+
"&p1="+price1+
"&i2="+item2+
"&p2="+price2+
"&i3="+item3+
"&p3="+price3+
"&total="+total

document.getElementById("result").innerHTML=

"ลิงก์บิล:<br><br>"+url

}

</script>

</body>
</html>
