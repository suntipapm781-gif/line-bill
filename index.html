<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>
body{font-family:sans-serif;background:#f4f6f9;padding:20px;}
.container{max-width:500px;margin:auto;background:white;padding:20px;border-radius:16px;}
th,td{padding:8px;}
td:nth-child(1){text-align:left;}
td:nth-child(2){text-align:center;}
td:nth-child(3){text-align:center;}
td:nth-child(4){text-align:right;}
.summary{background:#f1f3f6;padding:15px;border-radius:10px;margin-top:10px;}
.row{display:flex;justify-content:space-between;margin-bottom:6px;}
button{background:#1677ff;color:white;border:none;padding:10px;border-radius:8px;}
</style>

<script>
// 🔥 ถ้าไม่มี parameter → ไปหน้า create
if(!window.location.search){
window.location.href = "create.html";
}
</script>

</head>

<body>
<div class="container">

<h2>Order Detail</h2>
<div>Order ID: <span id="order"></span></div>
<div>Customer: <span id="customer"></span></div>

<h3>ข้อมูลสินค้า</h3>
<table width="100%">
<thead>
<tr><th>ชื่อสินค้า</th><th>ราคา</th><th>จำนวน</th><th>รวม</th></tr>
</thead>
<tbody>
<tr><td></td><td></td><td></td><td></td></tr>
<tr><td></td><td></td><td></td><td></td></tr>
<tr><td></td><td></td><td></td><td></td></tr>
</tbody>
</table>

<div class="summary">
<div class="row"><span>ยอดรวมสินค้า</span><span id="sub"></span></div>
<div class="row"><span>ค่าส่ง</span><span id="ship"></span></div>
<div class="row" style="font-weight:bold;"><span>ยอดรวม</span><span id="final"></span></div>
</div>

<br>

<img id="qr" width="200"><br><br>
<button onclick="sendLine()">ส่งเข้า LINE</button>

</div>

<script>

function format(n){
return Number(n||0).toLocaleString();
}

const p=new URLSearchParams(location.search);

document.getElementById("order").innerText=p.get("order");
document.getElementById("customer").innerText=p.get("customer");

let rows=document.querySelectorAll("tbody tr");

["1","2","3"].forEach((n,i)=>{
let iN=p.get("i"+n);
if(iN){
rows[i].children[0].innerText=iN;
rows[i].children[1].innerText=format(p.get("p"+n));
rows[i].children[2].innerText=p.get("q"+n);
rows[i].children[3].innerText=format(p.get("s"+n));
}
});

let total=p.get("total");
let shipping=p.get("shipping");
let final=p.get("final");

document.getElementById("sub").innerText=format(total);
document.getElementById("ship").innerText=format(shipping);
document.getElementById("final").innerText=format(final);

document.getElementById("qr").src="https://promptpay.io/0508347642/"+final+".png";

function sendLine(){
let url=location.href;
window.open("https://line.me/R/msg/text/?"+encodeURIComponent(url));
}

</script>

</body>
</html>
