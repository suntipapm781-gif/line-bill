<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Bill</title>
</head>

<body>

<div style="text-align:center">

<img src="logo png.png" width="120"><br><br>

<h2>Order Detail</h2>

</div>

<div id="bill"></div>

<br>

<h3 style="text-align:center">สแกนจ่ายเงิน</h3>

<div style="text-align:center">
<img id="qr" width="250">
</div>

<script>

const params = new URLSearchParams(window.location.search)

const id = params.get("id")
const name = params.get("name")
const total = params.get("total")
const items = params.get("items")

let itemList = ""

if(items){

let arr = items.split(",")

arr.forEach(i=>{

let p = i.split(":")

itemList += p[0]+" = "+p[1]+" บาท<br>"

})

}

document.getElementById("bill").innerHTML = `
Order ID : ${id}<br><br>
Customer : ${name}<br><br>

รายการ<br>
${itemList}<br>

Total : ${total} บาท
`

// เบอร์พร้อมเพย์ร้าน
let phone = "0954693100"

// สร้าง QR พร้อมเพย์
let qrURL = "https://promptpay.io/"+phone+"/"+total+".png"

document.getElementById("qr").src = qrURL

</script>

</body>
</html>
